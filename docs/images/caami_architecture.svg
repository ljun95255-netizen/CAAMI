<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 760" font-family="Arial, Helvetica, 'PingFang SC', 'Microsoft YaHei', sans-serif">
  <defs>
    <marker id="arr-green" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#16A34A"/>
    </marker>
    <marker id="arr-blue" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#2563EB"/>
    </marker>
    <marker id="arr-purple" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#9333EA"/>
    </marker>
    <marker id="arr-pink" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#DB2777"/>
    </marker>
    <marker id="arr-amber" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#D97706"/>
    </marker>
    <marker id="arr-gray" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#64748B"/>
    </marker>
  </defs>

  <!-- White background -->
  <rect width="1000" height="760" fill="#FFFFFF"/>
  <rect width="1000" height="760" fill="none" stroke="#E2E8F0" stroke-width="1"/>

  <!-- ===== Title ===== -->
  <text x="500" y="28" fill="#0F172A" font-size="16" font-weight="700" text-anchor="middle">CAAMI Policy — Active Sensing Architecture</text>
  <text x="500" y="46" fill="#94A3B8" font-size="10" text-anchor="middle">Cost-Aware Active Multi-Modal Inspection under Sparse High-Confidence Supervision</text>

  <!-- ===== LAYER 1: INPUT (Blue) ===== -->
  <rect x="20" y="60" width="960" height="100" rx="8" fill="#EFF6FF" stroke="#BFDBFE" stroke-width="1.5" stroke-dasharray="6,4"/>
  <rect x="20" y="60" width="960" height="22" rx="8" fill="#DBEAFE"/>
  <rect x="20" y="70" width="960" height="12" fill="#DBEAFE"/>
  <text x="35" y="76" fill="#1E40AF" font-size="10" font-weight="700">INPUT — Prior Belief &amp; Case State</text>

  <!-- Input components -->
  <rect x="50" y="92" width="200" height="55" rx="5" fill="#FFFFFF" stroke="#3B82F6" stroke-width="1.8"/>
  <text x="150" y="114" fill="#1E3A8A" font-size="11" font-weight="700" text-anchor="middle">Dense Prior Map</text>
  <text x="150" y="132" fill="#64748B" font-size="8.5" text-anchor="middle">Cheap proxy: RGB, thermal, eddy</text>

  <rect x="300" y="92" width="170" height="55" rx="5" fill="#FFFFFF" stroke="#3B82F6" stroke-width="1.8"/>
  <text x="385" y="114" fill="#1E3A8A" font-size="11" font-weight="700" text-anchor="middle">Posterior Belief</text>
  <text x="385" y="132" fill="#64748B" font-size="8.5" text-anchor="middle">GP: mean μ(x), variance σ²(x)</text>

  <rect x="520" y="92" width="150" height="55" rx="5" fill="#FFFFFF" stroke="#3B82F6" stroke-width="1.8"/>
  <text x="595" y="114" fill="#1E3A8A" font-size="11" font-weight="700" text-anchor="middle">Corruption Map</text>
  <text x="595" y="132" fill="#64748B" font-size="8.5" text-anchor="middle">Per-pixel noise [0,1]</text>

  <rect x="720" y="92" width="230" height="55" rx="5" fill="#FFFFFF" stroke="#3B82F6" stroke-width="1.8"/>
  <text x="835" y="114" fill="#1E3A8A" font-size="11" font-weight="700" text-anchor="middle">Observed Mask + Budget</text>
  <text x="835" y="132" fill="#64748B" font-size="8.5" text-anchor="middle">Already probed locations, cost remaining</text>

  <!-- ===== LAYER 2: CAAMI POLICY CORE (Green) ===== -->
  <rect x="20" y="175" width="780" height="290" rx="8" fill="#F0FDF4" stroke="#BBF7D0" stroke-width="1.5" stroke-dasharray="6,4"/>
  <rect x="20" y="175" width="780" height="22" rx="8" fill="#DCFCE7"/>
  <rect x="20" y="185" width="780" height="12" fill="#DCFCE7"/>
  <text x="35" y="191" fill="#166534" font-size="10" font-weight="700">CAAMI POLICY — Cost-Normalized Multi-Component Acquisition Score</text>

  <!-- Step 1: Multi-component score boxes -->
  <rect x="40" y="207" width="175" height="70" rx="5" fill="#FFFFFF" stroke="#22C55E" stroke-width="1.5"/>
  <text x="127" y="227" fill="#166534" font-size="10.5" font-weight="700" text-anchor="middle">Miss-Risk Utility</text>
  <text x="127" y="244" fill="#64748B" font-size="8" text-anchor="middle">P(miss) × severity</text>
  <text x="127" y="258" fill="#64748B" font-size="8" text-anchor="middle">× corruption boost</text>
  <text x="127" y="272" fill="#22C55E" font-size="7.5" text-anchor="middle">Weight: 10%</text>

  <rect x="240" y="207" width="175" height="70" rx="5" fill="#FFFFFF" stroke="#22C55E" stroke-width="1.5"/>
  <text x="327" y="227" fill="#166534" font-size="10.5" font-weight="700" text-anchor="middle">Gradient Diversity</text>
  <text x="327" y="244" fill="#64748B" font-size="8" text-anchor="middle">Spatial coverage</text>
  <text x="327" y="258" fill="#64748B" font-size="8" text-anchor="middle">∥∇prior∥ × dist. decay</text>
  <text x="327" y="272" fill="#22C55E" font-size="7.5" text-anchor="middle">Weight: 90%</text>

  <rect x="440" y="207" width="175" height="70" rx="5" fill="#FFFFFF" stroke="#22C55E" stroke-width="1.5"/>
  <text x="527" y="227" fill="#166534" font-size="10.5" font-weight="700" text-anchor="middle">Tail-Risk Focus</text>
  <text x="527" y="244" fill="#64748B" font-size="8" text-anchor="middle">Worst-case α = 18%</text>
  <text x="527" y="258" fill="#64748B" font-size="8" text-anchor="middle">Exceedance × corruption</text>
  <text x="527" y="272" fill="#22C55E" font-size="7.5" text-anchor="middle">Optional: 0–50%</text>

  <rect x="640" y="207" width="140" height="70" rx="5" fill="#FFFFFF" stroke="#22C55E" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="710" y="227" fill="#166534" font-size="10.5" font-weight="700" text-anchor="middle">Learned Blend</text>
  <text x="710" y="244" fill="#64748B" font-size="8" text-anchor="middle">Loss-proxy prior</text>
  <text x="710" y="258" fill="#64748B" font-size="8" text-anchor="middle">Activated when</text>
  <text x="710" y="272" fill="#94A3B8" font-size="7.5" text-anchor="middle">prior unreliable</text>

  <!-- Arrows: four scores → combined utility -->
  <polyline points="127,277 127,292 327,292 327,297" fill="none" stroke="#16A34A" stroke-width="1.2"/>
  <polyline points="327,277 327,297" fill="none" stroke="#16A34A" stroke-width="1.2"/>
  <polyline points="527,277 527,292 540,292 540,297" fill="none" stroke="#16A34A" stroke-width="1.2"/>
  <polyline points="710,277 710,292 735,292 735,297" fill="none" stroke="#16A34A" stroke-width="1.2" stroke-dasharray="4,3"/>

  <!-- Step 2: Combined utility → sensor-specific -->
  <rect x="200" y="297" width="380" height="42" rx="5" fill="#FFFFFF" stroke="#16A34A" stroke-width="2"/>
  <text x="390" y="317" fill="#166534" font-size="11" font-weight="700" text-anchor="middle">Combined Utility Score × Sensor Gain</text>
  <text x="390" y="333" fill="#64748B" font-size="8.5" text-anchor="middle">Gain(s) = info_gain × radius / noise  →  per-sensor scoring</text>

  <!-- Down arrow -->
  <polyline points="390,339 390,358" fill="none" stroke="#16A34A" stroke-width="1.8" marker-end="url(#arr-green)"/>

  <!-- Step 3: Cost normalization -->
  <rect x="200" y="358" width="380" height="42" rx="5" fill="#FFFFFF" stroke="#16A34A" stroke-width="2"/>
  <text x="390" y="378" fill="#166534" font-size="11" font-weight="700" text-anchor="middle">Cost Normalization (per sensor)</text>
  <text x="390" y="394" fill="#64748B" font-size="8.5" text-anchor="middle">Score ÷ max(sensor_cost + route_cost, ε)</text>

  <!-- Step 4: Select -->
  <polyline points="390,400 390,420" fill="none" stroke="#16A34A" stroke-width="1.8" marker-end="url(#arr-green)"/>

  <rect x="250" y="420" width="280" height="36" rx="5" fill="#DCFCE7" stroke="#16A34A" stroke-width="2"/>
  <text x="390" y="437" fill="#166534" font-size="11" font-weight="700" text-anchor="middle">argmax (sensor, location) pair</text>
  <text x="390" y="451" fill="#64748B" font-size="8" text-anchor="middle">Select max score among all sensors × locations</text>

  <!-- ===== SENSORS SIDEBAR (Purple) ===== -->
  <rect x="820" y="175" width="160" height="290" rx="8" fill="#FAF5FF" stroke="#E9D5FF" stroke-width="1.5" stroke-dasharray="6,4"/>
  <rect x="820" y="175" width="160" height="22" rx="8" fill="#F3E8FF"/>
  <rect x="820" y="185" width="160" height="12" fill="#F3E8FF"/>
  <text x="835" y="191" fill="#6B21A8" font-size="10" font-weight="700">SENSORS</text>

  <rect x="835" y="207" width="130" height="62" rx="5" fill="#FFFFFF" stroke="#A855F7" stroke-width="1.5"/>
  <text x="900" y="227" fill="#6B21A8" font-size="10" font-weight="700" text-anchor="middle">Thermal Patch</text>
  <text x="900" y="243" fill="#64748B" font-size="8" text-anchor="middle">cost=0.60, σ=0.13</text>
  <text x="900" y="256" fill="#64748B" font-size="8" text-anchor="middle">radius=3.0, gain=0.25</text>
  <text x="900" y="267" fill="#A855F7" font-size="7.5" text-anchor="middle">Cheap, noisy, wide</text>

  <rect x="835" y="282" width="130" height="62" rx="5" fill="#FFFFFF" stroke="#A855F7" stroke-width="1.5"/>
  <text x="900" y="302" fill="#6B21A8" font-size="10" font-weight="700" text-anchor="middle">DFT Probe</text>
  <text x="900" y="318" fill="#64748B" font-size="8" text-anchor="middle">cost=1.00, σ=0.08</text>
  <text x="900" y="331" fill="#64748B" font-size="8" text-anchor="middle">radius=3.8, gain=1.00</text>
  <text x="900" y="342" fill="#A855F7" font-size="7.5" text-anchor="middle">Mid cost, high precision</text>

  <rect x="835" y="357" width="130" height="62" rx="5" fill="#FFFFFF" stroke="#A855F7" stroke-width="1.5"/>
  <text x="900" y="377" fill="#6B21A8" font-size="10" font-weight="700" text-anchor="middle">UT Probe</text>
  <text x="900" y="393" fill="#64748B" font-size="8" text-anchor="middle">cost=3.20, σ=0.04</text>
  <text x="900" y="406" fill="#64748B" font-size="8" text-anchor="middle">radius=4.5, gain=0.75</text>
  <text x="900" y="417" fill="#A855F7" font-size="7.5" text-anchor="middle">Expensive, highest precision</text>

  <!-- Horizontal connector: policy → sensors -->
  <line x1="530" y1="400" x2="818" y2="400" stroke="#A855F7" stroke-width="1.2" stroke-dasharray="4,3"/>
  <text x="675" y="414" fill="#A855F7" font-size="8" text-anchor="middle">sensor gain per candidate</text>

  <!-- ===== LAYER 3: OUTPUT (Amber) ===== -->
  <rect x="20" y="480" width="960" height="110" rx="8" fill="#FFFBEB" stroke="#FDE68A" stroke-width="1.5" stroke-dasharray="6,4"/>
  <rect x="20" y="480" width="960" height="22" rx="8" fill="#FEF3C7"/>
  <rect x="20" y="490" width="960" height="12" fill="#FEF3C7"/>
  <text x="35" y="496" fill="#B45309" font-size="10" font-weight="700">EXECUTION — Acquire, Update, Evaluate</text>

  <!-- Acquire + Update -->
  <rect x="50" y="512" width="250" height="65" rx="6" fill="#FFFFFF" stroke="#F59E0B" stroke-width="1.8"/>
  <text x="175" y="534" fill="#B45309" font-size="11" font-weight="700" text-anchor="middle">Acquire Observation</text>
  <text x="175" y="551" fill="#64748B" font-size="8.5" text-anchor="middle">Probe selected (sensor, location)</text>
  <text x="175" y="565" fill="#64748B" font-size="8.5" text-anchor="middle">Handle failure, noise, bias</text>
  <text x="175" y="576" fill="#F59E0B" font-size="7.5" text-anchor="middle">obs ∼ N(true_risk + bias, σ²)</text>

  <!-- Arrow -->
  <polyline points="300,544 340,544" fill="none" stroke="#D97706" stroke-width="1.5" marker-end="url(#arr-amber)"/>

  <rect x="340" y="512" width="250" height="65" rx="6" fill="#FFFFFF" stroke="#F59E0B" stroke-width="1.8"/>
  <text x="465" y="534" fill="#B45309" font-size="11" font-weight="700" text-anchor="middle">Belief Assimilation</text>
  <text x="465" y="551" fill="#64748B" font-size="8.5" text-anchor="middle">GP update: μ, σ² → μ', σ'²</text>
  <text x="465" y="565" fill="#64748B" font-size="8.5" text-anchor="middle">within sensor radius footprint</text>
  <text x="465" y="576" fill="#F59E0B" font-size="7.5" text-anchor="middle">K = Σ_xy (Σ_yy + σ²I)⁻¹</text>

  <!-- Arrow -->
  <polyline points="590,544 630,544" fill="none" stroke="#D97706" stroke-width="1.5" marker-end="url(#arr-amber)"/>

  <rect x="630" y="512" width="150" height="65" rx="6" fill="#FFFFFF" stroke="#F59E0B" stroke-width="1.8"/>
  <text x="705" y="532" fill="#B45309" font-size="11" font-weight="700" text-anchor="middle">Budget Check</text>
  <text x="705" y="549" fill="#64748B" font-size="8.5" text-anchor="middle">cost_used &lt; budget?</text>
  <text x="705" y="565" fill="#F59E0B" font-size="8" font-weight="600" text-anchor="middle">Yes → Loop</text>
  <text x="705" y="576" fill="#94A3B8" font-size="8" text-anchor="middle">No → Final Metrics</text>

  <!-- Loopback arrow: Budget Check → back to Input -->
  <polyline points="705,577 705,600 990,600 990,132 720,132" fill="none" stroke="#DB2777" stroke-width="1.5" stroke-dasharray="6,3" marker-end="url(#arr-pink)"/>
  <text x="995" y="370" fill="#DB2777" font-size="9" font-weight="600" transform="rotate(90, 995, 370)">Loop while budget remains</text>

  <!-- Final metrics -->
  <rect x="800" y="512" width="160" height="65" rx="6" fill="#FEF3C7" stroke="#F59E0B" stroke-width="2"/>
  <text x="880" y="534" fill="#B45309" font-size="11" font-weight="700" text-anchor="middle">Final Risk Map</text>
  <text x="880" y="551" fill="#64748B" font-size="8.5" text-anchor="middle">FNR · ECE · Risk-AUC</text>
  <text x="880" y="565" fill="#64748B" font-size="8.5" text-anchor="middle">Worst-region FNR</text>
  <text x="880" y="576" fill="#F59E0B" font-size="7.5" text-anchor="middle">Paired stats · Bootstrap CI</text>

  <!-- Arrow: No budget → Final metrics -->
  <line x1="780" y1="544" x2="798" y2="544" stroke="#D97706" stroke-width="1.5" marker-end="url(#arr-amber)"/>

  <!-- Down arrow: CAAMI → Execution -->
  <polyline points="390,456 390,475 175,475 175,510" fill="none" stroke="#D97706" stroke-width="1.8" marker-end="url(#arr-amber)"/>

  <!-- ===== LEGEND ===== -->
  <rect x="20" y="610" width="960" height="140" rx="6" fill="#F8FAFC" stroke="#CBD5E1" stroke-width="1"/>

  <text x="500" y="632" fill="#334155" font-size="11" font-weight="700" text-anchor="middle">Legend</text>

  <!-- Row 1 -->
  <rect x="35" y="645" width="22" height="12" rx="2" fill="#FFFFFF" stroke="#3B82F6" stroke-width="1.2"/>
  <text x="63" y="655" fill="#475569" font-size="9">Input / State</text>

  <rect x="160" y="645" width="22" height="12" rx="2" fill="#FFFFFF" stroke="#22C55E" stroke-width="1.2"/>
  <text x="188" y="655" fill="#475569" font-size="9">Policy / Score</text>

  <rect x="285" y="645" width="22" height="12" rx="2" fill="#FFFFFF" stroke="#A855F7" stroke-width="1.2"/>
  <text x="313" y="655" fill="#475569" font-size="9">Sensors</text>

  <rect x="390" y="645" width="22" height="12" rx="2" fill="#FFFFFF" stroke="#F59E0B" stroke-width="1.2"/>
  <text x="418" y="655" fill="#475569" font-size="9">Execution</text>

  <line x1="530" y1="651" x2="550" y2="651" stroke="#16A34A" stroke-width="1.5"/>
  <text x="556" y="655" fill="#475569" font-size="9">Forward flow</text>

  <line x1="660" y1="651" x2="680" y2="651" stroke="#DB2777" stroke-width="1.2" stroke-dasharray="6,3"/>
  <text x="686" y="655" fill="#475569" font-size="9">Loopback</text>

  <!-- Row 2: Key formulae -->
  <text x="35" y="678" fill="#64748B" font-size="9" font-weight="600">Score Formulation:</text>
  <text x="165" y="678" fill="#475569" font-size="9" font-family="'Courier New', monospace">Score(loc, sensor) = [0.10·Utility + 0.90·GradDiv + λ·TailRisk + γ·Learned] × Gain(s) / max(cost(s) + route, ε)</text>

  <text x="35" y="695" fill="#64748B" font-size="9" font-weight="600">Adaptivity:</text>
  <text x="120" y="695" fill="#475569" font-size="9">Route-aware when travel_cost ≥ 0.85×sensor_cost  ·  Learned-blend when prior unreliable or trusted probes costly  ·  Tail-risk when cost_ratio &gt; 8×</text>

  <text x="35" y="712" fill="#64748B" font-size="9" font-weight="600">Key Insight:</text>
  <text x="125" y="712" fill="#475569" font-size="9">Greedy one-step optimization achieves near-oracle mean FNR (0.001) but terminal worst-region closure remains an open frontier (→ see BOTTLENECK_ANALYSIS.md)</text>
</svg>
